<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyesta Diner - San Fernando | Space for Rent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="logo">Pyesta Diner - San Fernando</div>
                <ul class="nav-links">
                </ul>
            </div>
        </nav>
    </header>

    <!-- Hero Section with Slideshow -->
    <section class="hero" id="gallery">
        <div class="slideshow-container">
            <div class="slide fade">
                <img src="1.jpg" alt="Photo 1">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="2.jpg" alt="Photo 2">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="3.jpg" alt="Photo 3">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="4.jpg" alt="Photo 4">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="5.jpg" alt="Photo 5">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="6.jpg" alt="Photo 6">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="7.jpg" alt="Photo 7">
                <div class="slide-caption"></div>
            </div>
            <div class="slide fade">
                <img src="8.jpg" alt="Photo 8">
                <div class="slide-caption"></div>
            </div>

            <!-- Navigation Arrows -->
            <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
            <a class="next" onclick="changeSlide(1)">&#10095;</a>

            <!-- Dots for slide indicators -->
            <div class="dots-container">
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
                <span class="dot" onclick="currentSlide(5)"></span>
                <span class="dot" onclick="currentSlide(6)"></span>
                <span class="dot" onclick="currentSlide(7)"></span>
                <span class="dot" onclick="currentSlide(8)"></span>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; Pyesta Diner - San Fernando. All rights reserved.</p>
            <p>This is a professional property listing. Terms and conditions apply.</p>
            <p>JD</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
